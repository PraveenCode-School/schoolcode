<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>You are Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 10px;
            color: #dc2626;
        }

        p {
            margin-bottom: 30px;
            color: #4b5563;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>You are Offline</h1>
        <p>We cannot connect to the School Server.<br>Please check your internet connection and try again.</p>
        <button onclick="window.location.href='http://52.66.13.31'">Retry Connection</button>
    </div>
</body>

</html>
